<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Do you Love Me?</title>
    <link rel="icon" type="image/x-icon" href="/images/heart-solid-full.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chewy&family=Crafty+Girls&display=swap"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="hearts-container"></div>

    <div class="all-stuff">
      <div class="title">
        <h1>Do you love me? 💕</h1>
      </div>
      <p class="subtitle" id="subtitle">Be honest… 👀</p>
      <div class="outer-container">
        <div class="container" id="btn-container">
          <button class="yes btn" id="yesBtn">Yes 💖</button>
          <button class="no btn" id="noBtn">No</button>
        </div>
      </div>
      <p class="no-attempts" id="noAttempts"></p>
    </div>

    <!-- Celebration overlay -->
    <div class="celebration" id="celebration">
      <div class="celebration-content">
        <div class="celebration-emoji">💞</div>
        <h2>I KNEW IT!!! 🥳</h2>
        <p>You're officially the best person ever!!</p>
        <div class="celebration-hearts">💖💗💓💝💘💕</div>
      </div>
    </div>

    <div id="confetti-container"></div>

    <script src="index.js" charset="UTF-8"></script>
  </body>
</html>
